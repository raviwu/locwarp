[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
# macOS AF_UNIX sun_path is limited to 104 chars. The default pytest
# basetemp under /private/var/folders/... already consumes ~70 chars
# before the per-test suffix, which breaks tests that bind a Unix socket
# inside tmp_path (see test_tunnel_helper_client.py). Anchor under /tmp
# to keep socket paths short on every platform.
addopts = --basetemp=/tmp/lw-pytest
