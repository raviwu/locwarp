<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocWarp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Prevent any FOUC / white flash during Electron loadFile and React bootstrap. */
    html, body { background: #0f1117; color: #e8eaf0; margin: 0; }
    #root {
      opacity: 0;
      animation: app-boot-fade 320ms cubic-bezier(0.16, 1, 0.3, 1) 60ms forwards;
    }
    @keyframes app-boot-fade { to { opacity: 1; } }
    /* Bootstrap splash shown until React mounts and hides it. */
    .app-boot {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      gap: 18px; background: #0f1117; color: #9499ac;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 99999;
      transition: opacity 360ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .app-boot.hide { opacity: 0; pointer-events: none; }
    .app-boot-logo {
      width: 52px; height: 52px; border-radius: 12px;
      background: linear-gradient(135deg, #6c8cff 0%, #5a7ff0 100%);
      box-shadow: 0 8px 24px rgba(108, 140, 255, 0.3);
      display: flex; align-items: center; justify-content: center;
      animation: boot-logo 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .app-boot-logo svg { width: 28px; height: 28px; color: white; }
    @keyframes boot-logo {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(108, 140, 255, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 12px 32px rgba(108, 140, 255, 0.5); }
    }
    .app-boot-label { font-size: 13px; letter-spacing: 0.04em; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="boot" class="app-boot">
    <div class="app-boot-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>
    <div class="app-boot-label">LocWarp</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/boot-splash.ts"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
