name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests + cycle gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt import-linter

      - name: Run tests with coverage
        working-directory: backend
        run: python -m pytest -q --cov --cov-report=term-missing

      - name: Cycle gate (no core→api imports)
        working-directory: backend
        run: lint-imports

  frontend:
    name: Frontend type-check + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Layering gate (BookmarkList tree enforced; broad rules report-only)
        working-directory: frontend
        # depcruise exits 0 on warnings-only and 1 on an "error"-severity rule,
        # so the broad view-rule warnings stay non-blocking while the scoped
        # bookmarklist-no-direct-api error fails CI on a regression. Do NOT add
        # `|| true` — it would swallow that exit code and make the gate inert.
        run: npx depcruise src --config .dependency-cruiser.cjs

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        run: npx playwright test
