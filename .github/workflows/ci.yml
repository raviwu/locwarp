name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit lands on the same ref — saves
# runner minutes on rapid pushes (and bounds the documented mDNS 100%-CPU spin).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the test jobs only read the checkout. A future notify job
# that opens issues would request its own job-level issues:write.
permissions:
  contents: read

jobs:
  backend:
    name: Backend tests + cycle gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          # Only the files the backend job actually installs — NOT
          # requirements-build.txt (PyInstaller, used only by the release build),
          # so a build-dep bump doesn't needlessly bust the backend test cache.
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt import-linter

      - name: Run tests with coverage
        working-directory: backend
        run: python -m pytest -q --cov --cov-report=term-missing

      - name: Cycle gate (no core→api imports)
        working-directory: backend
        run: lint-imports

  frontend:
    name: Frontend type-check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Layering gate (BookmarkList tree enforced; broad rules report-only)
        working-directory: frontend
        # depcruise exits 0 on warnings-only and 1 on an "error"-severity rule,
        # so the broad view-rule warnings stay non-blocking while the scoped
        # bookmarklist-no-direct-api error fails CI on a regression. Do NOT add
        # `|| true` — it would swallow that exit code and make the gate inert.
        run: npx depcruise src --config .dependency-cruiser.cjs

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
