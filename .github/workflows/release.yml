name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required for softprops/action-gh-release

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build backend with PyInstaller
        working-directory: backend
        run: |
          python -m PyInstaller locwarp-backend.spec --noconfirm \
            --distpath ../dist-py \
            --workpath ../build-py/backend

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build

      - name: Package DMG (electron-builder)
        working-directory: frontend
        run: npm run dist:mac

      - name: List release artifacts
        run: ls -lh frontend/release/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.dmg
            LocWarp-admin.command
          fail_on_unmatched_files: true
          generate_release_notes: true
          append_body: true
          body_path: .github/release-footer.md
